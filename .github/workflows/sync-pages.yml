name: Sync Notebook Pages

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notebook-pages-sync
  cancel-in-progress: false

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check deployed source
        id: deployed
        run: |
          git fetch origin gh-pages --depth=1 || true
          deployed_sha="$(git show origin/gh-pages:deploy-source.txt 2>/dev/null || true)"
          if [ "$deployed_sha" = "$GITHUB_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.deployed.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.deployed.outputs.skip != 'true'
        run: npm ci

      - name: Build site
        if: steps.deployed.outputs.skip != 'true'
        run: npm run build

      - name: Deploy gh-pages
        if: steps.deployed.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_SHA" > dist/deploy-source.txt
          touch dist/.nojekyll
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Deploy Notebook Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
