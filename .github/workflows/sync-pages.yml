name: Sync Notebook Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notebook-pages-sync
  cancel-in-progress: false

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check deployed source
        id: deployed
        run: |
          git fetch origin gh-pages --depth=1 || true
          deployed_sha="$(git show origin/gh-pages:deploy-source.txt 2>/dev/null || true)"
          if [ "$deployed_sha" = "$GITHUB_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare static site
        if: steps.deployed.outputs.skip != 'true'
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html 404.html _site/
          cp -R admin src public _site/
          echo "$GITHUB_SHA" > _site/deploy-source.txt
          touch _site/.nojekyll

      - name: Deploy gh-pages
        if: steps.deployed.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Deploy Notebook Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
